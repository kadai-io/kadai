# This is the original usage scenario used for the Blue Angel certification in 2025

name: KADAI - PostgreSQL - Standard Usage
author: envite consulting GmbH
description: Messung eines realistischen KADAI-Nutzungsszenarios mit hundert API-Nutzern und Pausen von vier Sekunden zwischen den einzelnen Aktivitäten. Nach einer Aufwärmphase zur Stabilisierung von JIT folgt die Messung des Standard-Workflows -- Tasks (Aufgaben) erstellen, bearbeiten, zuweisen und abschließen; Workbaskets (Postkörbe) suchen und öffnen; Kommentare lesen, schreiben und löschen; Task-Status-Report abrufen.

compose-file: !include compose.yml

custom_metrics:
  response_time_avg:
    unit: us
    regex: ^(\d+) http_req_duration_avg\s+([\d\.]+)
  response_time_min:
    unit: us
    regex: ^(\d+) http_req_duration_min\s+([\d\.]+)
  response_time_max:
    unit: us
    regex: ^(\d+) http_req_duration_max\s+([\d\.]+)
  response_time_p95:
    unit: us
    regex: ^(\d+) http_req_duration_p95\s+([\d\.]+)
  throughput:
    unit: "reqs per s"
    regex: ^(\d+) http_reqs_per_second\s+([\d\.]+)

flow:
  - name: Warm-up
    container: k6
    commands:
      - type: console
        command: k6 run /tmp/repo/qa/gmt/k6/blue_angel/1_warm_up.js
  - name: Pause
    container: k6
    commands:
      - type: console
        command: k6 run --log-format=raw --log-output=stdout /tmp/repo/qa/gmt/k6/blue_angel/2_pause.js
        log-stdout: true
        read-notes-stdout: true
  - name: Standard Usage Scenario
    container: k6
    commands:
      - type: console
        command: k6 run --log-format=raw --log-output=stdout /tmp/repo/qa/gmt/k6/blue_angel/3_standard_usage_scenario.js
        log-stdout: true
        read-notes-stdout: true
