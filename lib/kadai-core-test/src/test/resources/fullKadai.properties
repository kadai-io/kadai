# general configuration
kadai.domains[0]=DOMAIN_A
kadai.domains[1]=DOMAIN_B
kadai.service-level.validation.enforce=false
kadai.routing.include-owner=true
# authentication configuration
kadai.roles.user[0]=user-1
kadai.roles.user[1]=user-2
kadai.roles.admin[0]=admin-1
kadai.roles.admin[1]=admin-2
kadai.roles.business-admin[0]=business_admin-1
kadai.roles.business-admin[1]=business_admin-2
kadai.roles.monitor[0]=monitor-1
kadai.roles.monitor[1]=monitor-2
kadai.roles.task-admin[0]=taskadmin-1
kadai.roles.task-admin[1]=taskadmin-2
kadai.roles.task-router[0]=taskrouter-1
kadai.roles.task-router[1]=taskrouter-2
# classification configuration
kadai.classification.types[0]=TASK
kadai.classification.types[1]=document
kadai.classification.categories.task[0]=EXTERNAL
kadai.classification.categories.task[1]=manual
kadai.classification.categories.task[2]=autoMAtic
kadai.classification.categories.task[3]=Process
kadai.classification.categories.document[0]=EXTERNAL
# working time configuration
kadai.working-time.use-working-time-calculation=false
kadai.working-time.schedule.monday[0].begin=09:00
kadai.working-time.schedule.monday[0].end=18:00
kadai.working-time.schedule.tuesday[0].begin=09:00
kadai.working-time.schedule.tuesday[0].end=18:00
kadai.working-time.schedule.wednesday[0].begin=09:00
kadai.working-time.schedule.wednesday[0].end=18:00
kadai.working-time.schedule.thursday[0].begin=09:00
kadai.working-time.schedule.thursday[0].end=18:00
kadai.working-time.schedule.friday[0].begin=09:00
kadai.working-time.schedule.friday[0].end=18:00
kadai.working-time.timezone=UTC
kadai.working-time.holidays.custom[0].day=31
kadai.working-time.holidays.custom[0].month=7
kadai.working-time.holidays.custom[1].day=16
kadai.working-time.holidays.custom[1].month=12
kadai.working-time.holidays.german.enabled=false
kadai.working-time.holidays.german.corpus-christi.enabled=true
# history configuration
kadai.history.simple.delete-on-task-deletion.enabled=true
kadai.history.logger.name=AUDIT
# job configuration
kadai.jobs.scheduler.enabled=false
kadai.jobs.scheduler.initial-start-delay=30
kadai.jobs.scheduler.period=12
kadai.jobs.scheduler.period-time-unit=HOURS
kadai.jobs.max-retries=4
kadai.jobs.batch-size=50
kadai.jobs.first-run-at=2018-07-25T08:00:00Z
kadai.jobs.run-every=P2D
kadai.jobs.lock-expiration-period=PT7M
kadai.jobs.cleanup.task.enable=false
kadai.jobs.cleanup.task.minimum-age=P15D
kadai.jobs.cleanup.task.all-completed-same-parent-business=false
kadai.jobs.cleanup.task.lock-expiration-period=PT4M
kadai.jobs.cleanup.workbasket.enable=false
kadai.jobs.cleanup.workbasket.lock-expiration-period=PT3M
kadai.jobs.cleanup.history.simple.enable=true
kadai.jobs.cleanup.history.simple.batch-size=50
kadai.jobs.cleanup.history.simple.minimum-age=P17D
kadai.jobs.cleanup.history.simple.all-completed-same-parent-business=false
kadai.jobs.cleanup.history.simple.lock-expiration-period=PT2M
kadai.jobs.priority.task.enable=true
kadai.jobs.priority.task.batch-size=50
kadai.jobs.priority.task.first-run-at=2018-07-25T08:00:00Z
kadai.jobs.priority.task.run-every=P3D
kadai.jobs.priority.task.lock-expiration-period=PT8M
kadai.jobs.refresh.user.enable=true
kadai.jobs.refresh.user.first-run-at=2018-07-25T08:00:00Z
kadai.jobs.refresh.user.run-every=P4D
kadai.jobs.refresh.user.lock-expiration-period=PT5M
kadai.jobs.custom-jobs[0]=A
kadai.jobs.custom-jobs[1]=B
kadai.jobs.custom-jobs[2]=C
# user configuration
kadai.user.add-additional-user-info=true
kadai.user.minimal-permissions-to-assign-domains[0]=READ
kadai.user.minimal-permissions-to-assign-domains[1]=OPEN
# database configuration
kadai.feature.use-specific-db2-taskquery=false
# custom configuration
my_custom_property1=my_custom_value1
my_custom_property2=my_custom_value2
# property with password
kadai.ldap.bindPassword=secret
